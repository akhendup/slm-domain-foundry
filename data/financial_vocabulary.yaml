# financial_vocabulary.yaml
#
# Generic financial domain knowledge for combinatorial Q&A generation.
# Expanded against question_templates.yaml (financial + general sections).
# No account numbers, statement line items, or institution-specific identifiers.

metadata:
  domain: financial
  version: "2.0"
  description: "Generic financial concepts for SLM Domain Foundry reference profile"

transactions:

  - name: ACH Transfer
    category: transaction_type
    description: >
      An ACH transfer is an electronic funds movement processed through a batch
      clearing network. Credits add funds to an account; debits withdraw funds.
      Settlement is typically same-day or next business day depending on service level.
    one_sentence: >
      An ACH transfer moves funds electronically through a clearing network with batch settlement.
    examples:
      - scenario: Payroll deposit
        description: >
          An employer submits recurring payroll credits; payees receive labeled deposit
          entries on scheduled pay dates reflecting net compensation.
      - scenario: Recurring bill payment
        description: >
          A customer authorizes a service provider to pull a recurring debit on each billing cycle.
    related:
      - Wire Transfer
      - Electronic Payment
    common_errors:
      - error: Returned transfer
        cause: Insufficient funds or revoked authorization
        solution: Confirm available balance and valid authorization before retrying
    analysis_notes: >
      Track return codes and settlement timing when reconciling cash activity.

  - name: Wire Transfer
    category: transaction_type
    description: >
      A wire transfer is a direct electronic funds movement between institutions,
      typically settling individually rather than in batch. Domestic and cross-border
      wires may involve correspondent institutions and compliance review.
    one_sentence: >
      A wire transfer moves funds directly between institutions, often with same-day settlement.
    examples:
      - scenario: Escrow funding
        description: >
          A buyer sends funds to an escrow arrangement; the transfer is verified before closing proceeds.
      - scenario: Cross-border vendor payment
        description: >
          A business pays an overseas supplier; currency conversion and intermediary fees may apply.
    related:
      - ACH Transfer
      - Electronic Payment
    common_errors:
      - error: Wire rejected
        cause: Incorrect beneficiary details or compliance hold
        solution: Verify beneficiary information and resubmit with corrected data
    analysis_notes: >
      Wires are generally irrevocable once released; validate details before submission.

  - name: Electronic Payment
    category: transaction_type
    description: >
      Electronic payments include card, mobile, and account-to-account transfers
      initiated through digital channels. They support retail, subscription, and
      peer-to-peer use cases with varying settlement paths.
    one_sentence: >
      Electronic payments move funds through digital channels such as cards or mobile apps.
    examples:
      - scenario: Subscription billing
        description: >
          A customer authorizes a recurring electronic charge for a subscription service.
      - scenario: Peer-to-peer transfer
        description: >
          One party sends funds to another through a linked banking or wallet application.
    related:
      - ACH Transfer
      - Payment Reconciliation
    analysis_notes: >
      Reconcile authorization, settlement, and chargeback events separately.

  - name: Payment Reconciliation
    category: transaction_type
    description: >
      Payment reconciliation matches internal records to external settlement reports,
      identifying timing differences, fees, and exceptions that require adjustment entries.
    one_sentence: >
      Payment reconciliation aligns internal payment records with external settlement data.
    examples:
      - scenario: End-of-day settlement
        description: >
          Operations compares the day's payment file to the processor settlement report and posts adjustments.
    related:
      - Electronic Payment
      - Cash Flow Analysis
    common_errors:
      - error: Unmatched settlement item
        cause: Timing difference or missing reference identifier
        solution: Investigate cutoff windows and tie items using reference metadata
    analysis_notes: >
      Maintain clear mapping between authorization, capture, and settlement events.

balances:

  - name: Opening Balance
    category: balance_concept
    description: >
      The opening balance is the starting position for a reporting period before
      new activity is applied. It anchors reconciliation and period-over-period analysis.
    one_sentence: >
      The opening balance is the account position at the start of a reporting period.
    examples:
      - scenario: Monthly close
        description: >
          Finance carries forward the prior period closing balance as the opening balance for the new month.
    related:
      - Closing Balance
      - Net Change
    analysis_notes: >
      Opening and closing balances must tie to supporting activity for the period.

  - name: Closing Balance
    category: balance_concept
    description: >
      The closing balance reflects the position after all recognized activity for
      the period. It becomes the next period's opening balance when periods are contiguous.
    one_sentence: >
      The closing balance is the account position after all period activity is recorded.
    examples:
      - scenario: Period-end reporting
        description: >
          Accountants verify that closing balances match the general ledger and supporting schedules.
    related:
      - Opening Balance
      - Net Change
    analysis_notes: >
      Investigate large unexplained changes between opening and closing balances.

  - name: Net Change
    category: balance_concept
    description: >
      Net change summarizes total inflows minus outflows over a period. It explains
      movement between opening and closing balances independent of individual line items.
    one_sentence: >
      Net change is the difference between opening and closing balances for a period.
    examples:
      - scenario: Liquidity review
        description: >
          Treasury reviews net change trends to assess whether cash reserves are adequate.
    related:
      - Opening Balance
      - Closing Balance
    analysis_notes: >
      Decompose net change by category to distinguish operational vs. non-operational flows.

analysis:

  - name: Cash Flow Analysis
    category: analysis_pattern
    description: >
      Cash flow analysis compares inflows and outflows over time to assess liquidity,
      sustainability, and the ability to meet obligations. It supports underwriting,
      budgeting, and operational planning.
    one_sentence: >
      Cash flow analysis measures money in versus money out to assess financial health.
    examples:
      - scenario: Operating review
        description: >
          Analysts trend monthly inflows and outflows to identify seasonality and stress periods.
    related:
      - Expense Categorization
      - Payment Reconciliation
    analysis_notes: >
      Separate operating, investing, and financing flows when interpreting trends.

  - name: Expense Categorization
    category: analysis_pattern
    description: >
      Expense categorization groups spending into meaningful classes such as payroll,
      occupancy, and professional services. Consistent categories enable budgeting
      and variance analysis.
    one_sentence: >
      Expense categorization classifies spending into groups for budgeting and analysis.
    examples:
      - scenario: Budget variance
        description: >
          Finance compares actual categorized spend to plan and investigates material variances.
    related:
      - Cash Flow Analysis
    common_errors:
      - error: Miscategorized expense
        cause: Ambiguous merchant or missing classification rules
        solution: Maintain a category mapping policy and periodic rule review
    analysis_notes: >
      Review category definitions when business lines or vendors change.
