name: Tests and coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests (coverage gate 75% on app, data, train)
        run: |
          pytest tests/ --tb=short \
            --ignore=tests/real/test_apple_silicon_mps.py \
            --cov=app --cov=data --cov=train \
            --cov-report=term-missing \
            --cov-fail-under=75

  apple-silicon-mps:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (macOS — skip bitsandbytes)
        run: |
          python -m pip install --upgrade pip
          grep -v '^bitsandbytes' requirements.txt | pip install -r /dev/stdin
          pip install pytest
      - name: Run Apple Silicon MPS tests
        run: |
          pytest tests/real/test_apple_silicon_mps.py -v --tb=short -m mps
