[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: fast, isolated unit tests (no I/O, no heavy deps)
    quality: data quality / format correctness tests
    e2e: end-to-end pipeline tests (file I/O, subprocess)
    app: UI smoke tests (Gradio app construction)
    real: real models, sample_data, and I/O (no unittest.mock)
    slow: tests that take > 5 seconds
    gpu: requires CUDA (e.g. Unsloth training)
